# =============================================================================
# AGI Unified Framework - Kubernetes Namespace
# =============================================================================
# 定义AGI框架的Kubernetes命名空间
# 用于逻辑隔离不同环境（开发、测试、生产）的资源
# =============================================================================

---
# 开发环境命名空间
apiVersion: v1
kind: Namespace
metadata:
  name: agi-framework-dev
  labels:
    app.kubernetes.io/name: agi-framework
    app.kubernetes.io/component: namespace
    app.kubernetes.io/environment: development
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/part-of: agi-unified-framework
  annotations:
    description: "AGI Unified Framework - Development Environment"
    owner: "platform-team@company.com"
    cost-center: "engineering"

---
# 测试环境命名空间
apiVersion: v1
kind: Namespace
metadata:
  name: agi-framework-staging
  labels:
    app.kubernetes.io/name: agi-framework
    app.kubernetes.io/component: namespace
    app.kubernetes.io/environment: staging
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/part-of: agi-unified-framework
  annotations:
    description: "AGI Unified Framework - Staging Environment"
    owner: "platform-team@company.com"
    cost-center: "engineering"

---
# 生产环境命名空间
apiVersion: v1
kind: Namespace
metadata:
  name: agi-framework-prod
  labels:
    app.kubernetes.io/name: agi-framework
    app.kubernetes.io/component: namespace
    app.kubernetes.io/environment: production
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/part-of: agi-unified-framework
    # 网络策略标签
    network-policy: restricted
  annotations:
    description: "AGI Unified Framework - Production Environment"
    owner: "platform-team@company.com"
    cost-center: "engineering"
    # 资源配额注解
    resource-quota: enabled
    # Pod安全策略
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
