# =============================================================================
# AGI Unified Framework - Kubernetes Secret
# =============================================================================
# 存储敏感数据，如密码、API密钥、证书等
# 注意：实际使用时，请使用base64编码真实值或使用Sealed Secrets/External Secrets
# 示例值仅用于演示，生产环境请替换为实际加密值
# =============================================================================

---
# 应用密钥和敏感配置
apiVersion: v1
kind: Secret
metadata:
  name: agi-framework-secrets
  namespace: agi-framework-prod
  labels:
    app.kubernetes.io/name: agi-framework
    app.kubernetes.io/component: secret
    app.kubernetes.io/part-of: agi-unified-framework
type: Opaque
stringData:
  # 应用密钥（生产环境请使用强随机字符串）
  APP_SECRET_KEY: "change-this-to-a-32-character-secret-key"
  
  # 数据库凭证
  DB_USER: "agi_user"
  DB_PASSWORD: "secure-db-password-change-me"
  DATABASE_URL: "postgresql://agi_user:secure-db-password-change-me@postgres:5432/agi_framework"
  
  # Redis密码
  REDIS_PASSWORD: "secure-redis-password-change-me"
  
  # JWT配置
  JWT_SECRET_KEY: "change-this-jwt-secret-key-min-32-chars"
  JWT_ALGORITHM: "HS256"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
  
  # 外部API密钥
  OPENAI_API_KEY: "sk-your-openai-api-key-here"
  ANTHROPIC_API_KEY: "sk-ant-your-anthropic-api-key"
  AZURE_OPENAI_KEY: "your-azure-openai-key"
  
  # AWS/S3配置
  AWS_ACCESS_KEY_ID: "AKIA..."
  AWS_SECRET_ACCESS_KEY: "your-aws-secret-key"
  S3_ACCESS_KEY: "minio-access-key"
  S3_SECRET_KEY: "minio-secret-key"
  
  # 邮件服务配置
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "noreply@company.com"
  SMTP_PASSWORD: "your-smtp-password"
  
  # OAuth配置
  GOOGLE_CLIENT_ID: "your-google-client-id"
  GOOGLE_CLIENT_SECRET: "your-google-client-secret"
  GITHUB_CLIENT_ID: "your-github-client-id"
  GITHUB_CLIENT_SECRET: "your-github-client-secret"

---
# TLS证书（示例，实际应使用cert-manager或外部证书管理）
apiVersion: v1
kind: Secret
metadata:
  name: agi-framework-tls
  namespace: agi-framework-prod
  labels:
    app.kubernetes.io/name: agi-framework
    app.kubernetes.io/component: tls
    app.kubernetes.io/part-of: agi-unified-framework
type: kubernetes.io/tls
data:
  # 使用以下命令生成示例证书（仅用于测试）：
  # openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
  #   -keyout tls.key -out tls.crt -subj "/CN=agi-framework.local"
  # 然后使用 base64 编码
  tls.crt: |
    LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCk1JSUMrekNDQWVPZ0F3SUJBZ0lKQUxNRXJh
    N2dWcHJGTUEwR0NTcUdTSWIzRFFFQkN3VUFNQ0F4SGpBY0JnTlYKQkFNTUZYTmxZM1Z5WlMx
    allTMHdLREFUQmdjcWhrak8KUFFJQkJnY3Foa2pPUFFNQkJ3TkNBQVRxNlVYd2d0dFlnPT0K
    LS0tLS1FTkQgQ0VSVElGSUNBVEUtLS0tLQo=
  tls.key: |
    LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCk1JSUV2Z0lCQURBTkJna3Foa2lHOXcwQkFR
    RUZBQVNDQktnd2dnU2tBZ0VBQW9JQkFRRFNybFI7QVRBU0JnTlZIUk1FQlRBREFRSC8K
    LS0tLS1FTkQgUFJJVkFURSBLRVktLS0tLQo=

---
# Docker Registry 认证（用于拉取私有镜像）
apiVersion: v1
kind: Secret
metadata:
  name: regcred
  namespace: agi-framework-prod
  labels:
    app.kubernetes.io/name: agi-framework
    app.kubernetes.io/component: registry-credentials
type: kubernetes.io/dockerconfigjson
data:
  # 使用以下命令生成：
  # kubectl create secret docker-registry regcred \
  #   --docker-server=registry.company.com \
  #   --docker-username=username \
  #   --docker-password=password \
  #   --docker-email=email@company.com \
  #   --dry-run=client -o yaml
  .dockerconfigjson: |
    eyJhdXRocyI6eyJyZWdpc3RyeS5jb21wYW55LmNvbSI6eyJ1c2VybmFtZSI6InVzZXJuYW1l
    IiwicGFzc3dvcmQiOiJwYXNzd29yZCIsImVtYWlsIjoiZW1haWxAY29tcGFueS5jb20iLCJh
    dXRoIjoiZFhObGNqcHdZWE56ZDI5eVpBPT0ifX19
