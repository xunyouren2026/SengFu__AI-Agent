# =============================================================================
# AGI Unified Framework - Docker Compose Configuration
# =============================================================================
# 完整的本地开发和生产环境编排配置
# 包含应用服务、数据库、缓存、消息队列和监控
# =============================================================================

version: "3.9"

# -----------------------------------------------------------------------------
# 全局配置
# -----------------------------------------------------------------------------
x-common-variables: &common-variables
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  TZ: ${TZ:-Asia/Shanghai}
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-common-deploy: &common-deploy
  resources:
    limits:
      cpus: "2.0"
      memory: 2G
    reservations:
      cpus: "0.5"
      memory: 512M
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
    window: 120s

# -----------------------------------------------------------------------------
# 服务定义
# -----------------------------------------------------------------------------
services:
  # ---------------------------------------------------------------------------
  # 主应用服务
  # ---------------------------------------------------------------------------
  agi-api:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: runtime
    container_name: agi-unified-api
    hostname: agi-api
    <<: [*common-variables]
    environment:
      # 应用配置
      APP_NAME: ${APP_NAME:-AGI Unified Framework}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      
      # 数据库配置
      DATABASE_URL: postgresql://${DB_USER:-agi}:${DB_PASSWORD:-agi123}@postgres:5432/${DB_NAME:-agi_framework}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      
      # Redis配置
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      
      # 消息队列配置
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      
      # 向量数据库配置
      VECTOR_DB_HOST: milvus
      VECTOR_DB_PORT: 19530
      
      # 对象存储配置
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-agi-assets}
      
      # 监控配置
      JAEGER_AGENT_HOST: jaeger
      JAEGER_AGENT_PORT: 6831
      
      # 模型服务配置
      MODEL_SERVICE_URL: ${MODEL_SERVICE_URL:-http://model-service:8080}
      EMBEDDING_SERVICE_URL: ${EMBEDDING_SERVICE_URL:-http://embedding-service:8080}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - agi_logs:/app/logs
      - agi_data:/app/data
      - ./config:/app/config:ro
    networks:
      - agi-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      <<: *common-deploy
      replicas: ${API_REPLICAS:-2}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agi-api.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.services.agi-api.loadbalancer.server.port=8000"

  # ---------------------------------------------------------------------------
  # Celery Worker - 异步任务处理
  # ---------------------------------------------------------------------------
  celery-worker:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: runtime
    container_name: agi-celery-worker
    hostname: celery-worker
    <<: [*common-variables]
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATABASE_URL: postgresql://${DB_USER:-agi}:${DB_PASSWORD:-agi123}@postgres:5432/${DB_NAME:-agi_framework}
      REDIS_URL: redis://redis:6379/0
    command: celery -A api.celery_app worker --loglevel=info --concurrency=4 -Q default,high_priority,low_priority
    volumes:
      - agi_logs:/app/logs
      - agi_data:/app/data
    networks:
      - agi-network
    depends_on:
      - redis
      - postgres
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
      restart_policy:
        condition: on-failure
    healthcheck:
      test: celery -A api.celery_app inspect ping
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Celery Beat - 定时任务调度
  # ---------------------------------------------------------------------------
  celery-beat:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: runtime
    container_name: agi-celery-beat
    hostname: celery-beat
    <<: [*common-variables]
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A api.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - agi_logs:/app/logs
      - celery_beat_data:/app/celerybeat
    networks:
      - agi-network
    depends_on:
      - redis
      - postgres
    deploy:
      restart_policy:
        condition: on-failure

  # ---------------------------------------------------------------------------
  # PostgreSQL 数据库
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: agi-postgres
    hostname: postgres
    environment:
      POSTGRES_USER: ${DB_USER:-agi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agi123}
      POSTGRES_DB: ${DB_NAME:-agi_framework}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - agi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agi} -d ${DB_NAME:-agi_framework}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=2621kB
      -c min_wal_size=1GB
      -c max_wal_size=4GB

  # ---------------------------------------------------------------------------
  # Redis 缓存和消息队列
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: agi-redis
    hostname: redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - agi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ---------------------------------------------------------------------------
  # MinIO 对象存储
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: agi-minio
    hostname: minio
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:${MINIO_CONSOLE_PORT:-9001}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - agi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ---------------------------------------------------------------------------
  # Nginx 反向代理
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: agi-nginx
    hostname: nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - agi_static:/var/www/static:ro
    networks:
      - agi-network
    depends_on:
      - agi-api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # 监控: Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: agi-prometheus
    hostname: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - agi-network

  # ---------------------------------------------------------------------------
  # 监控: Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: agi-grafana
    hostname: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - agi-network
    depends_on:
      - prometheus

# -----------------------------------------------------------------------------
# 网络配置
# -----------------------------------------------------------------------------
networks:
  agi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    labels:
      - "com.agi.framework.network=true"

# -----------------------------------------------------------------------------
# 持久化卷
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/postgres

  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/redis

  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/minio

  agi_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/logs

  agi_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/app

  agi_static:
    driver: local

  celery_beat_data:
    driver: local

  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/prometheus

  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/grafana
