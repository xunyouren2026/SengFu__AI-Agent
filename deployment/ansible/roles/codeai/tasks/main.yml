---
- name: Check Python version
  command: python3 --version
  register: python_version
  changed_when: no
- name: Install Python development packages
  apt:
    name:
      - python3-dev
      - python3-pip
      - python3-venv
      - python3-wheel
      - build-essential
      - libpq-dev
    state: present
- name: Upgrade pip
  pip:
    name: pip
    extra_args: --upgrade
    executable: pip3
- name: Install system dependencies for ML libraries
  apt:
    name:
      - libopenblas-dev
      - liblapack-dev
      - gfortran
      - libsndfile1-dev
      - libjpeg-dev
      - libpng-dev
      - libtiff-dev
      - libavcodec-dev
      - libavformat-dev
      - libswscale-dev
      - libxvidcore-dev
      - libx264-dev
      - libtorch-dev
      - nvidia-cuda-toolkit
    state: present
  ignore_errors: yes
- name: Create application virtual environment
  pip:
    name: virtualenv
    executable: pip3
  become_user: "{{ codeai_user | default('agiuser') }}"
- name: Create application directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: "{{ codeai_user | default('agiuser') }}"
  loop:
    - "{{ codeai_app_dir | default('/opt/codeai') }}"
    - "{{ codeai_data_dir | default('/data/codeai') }}"
    - "{{ codeai_cache_dir | default('/var/cache/codeai') }}"
    - "{{ codeai_log_dir | default('/var/log/codeai') }}"
    - "{{ codeai_models_dir | default('/models') }}"
- name: Clone or update application repository
  git:
    repo: "{{ codeai_repo | default('https://github.com/example/codeai.git') }}"
    dest: "{{ codeai_app_dir | default('/opt/codeai') }}"
    version: "{{ codeai_version | default('main') }}"
    force: yes
    accept_hostkey: yes
  when: codeai_clone_repo | default(true)
- name: Install Python dependencies
  pip:
    requirements: "{{ codeai_app_dir }}/requirements.txt"
    executable: pip3
    extra_args: "--user --no-warn-script-location"
  become_user: "{{ codeai_user | default('agiuser') }}"
  when: codeai_install_deps | default(true)
- name: Download AI models
  shell: |
    python3 -c "
    import os
    models_dir = '{{ codeai_models_dir | default('/models') }}'
    os.makedirs(models_dir, exist_ok=True)
    print('Models ready')
    "
  become_user: "{{ codeai_user | default('agiuser') }}"
  when: codeai_download_models | default(false)
- name: Initialize database
  shell: |
    cd {{ codeai_app_dir }} && python3 manage.py migrate --noinput
  environment:
    DJANGO_SETTINGS_MODULE: "{{ codeai_settings | default('config.settings.prod') }}"
    DATABASE_URL: "{{ codeai_db_url }}"
  become_user: "{{ codeai_user | default('agiuser') }}"
  when: codeai_migrate | default(true)
  ignore_errors: yes
- name: Collect static files
  shell: |
    cd {{ codeai_app_dir }} && python3 manage.py collectstatic --noinput
  environment:
    DJANGO_SETTINGS_MODULE: "{{ codeai_settings | default('config.settings.prod') }}"
  become_user: "{{ codeai_user | default('agiuser') }}"
  when: codeai_collectstatic | default(true)
  ignore_errors: yes
- name: Create systemd service for API
  template:
    src: codeai-api.service.j2
    dest: /etc/systemd/system/codeai-api.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart codeai-api
- name: Create systemd service for worker
  template:
    src: codeai-worker.service.j2
    dest: /etc/systemd/system/codeai-worker.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart codeai-worker
- name: Enable and start API service
  systemd:
    name: codeai-api
    enabled: yes
    state: started
    daemon_reload: yes
- name: Enable and start worker service
  systemd:
    name: codeai-worker
    enabled: yes
    state: started
    daemon_reload: yes
- name: Check API health
  uri:
    url: "http://{{ codeai_api_host | default('localhost') }}:{{ codeai_api_port | default('8000') }}/health"
    method: GET
    status_code: 200
  register: api_health
  until: api_health.status == 200
  retries: 10
  delay: 5
  ignore_errors: yes
- name: Setup Nginx reverse proxy
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/codeai
    mode: "0644"
  notify: Reload nginx
  when: codeai_nginx | default(true)
- name: Enable Nginx site
  file:
    src: /etc/nginx/sites-available/codeai
    dest: /etc/nginx/sites-enabled/codeai
    state: link
  notify: Reload nginx
  when: codeai_nginx | default(true)
- name: Test Nginx configuration
  command: nginx -t
  notify: Reload nginx
  changed_when: no
  when: codeai_nginx | default(true)
- name: Setup SSL certificates
  command: certbot --nginx -d {{ codeai_domain }} --noninteractive --agree-tos -m {{ codeai_email }}
  when: codeai_ssl | default(false) and codeai_domain is defined
  ignore_errors: yes
handlers:
  - name: Reload systemd
    systemd:
      daemon_reload: yes
  - name: Restart codeai-api
    systemd:
      name: codeai-api
      state: restarted
  - name: Restart codeai-worker
    systemd:
      name: codeai-worker
      state: restarted
  - name: Reload nginx
    systemd:
      name: nginx
      state: reloaded
