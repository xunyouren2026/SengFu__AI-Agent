{{/* =============================================================================
AGI Unified Framework - Secret Template
============================================================================= */}}
{{- if .Values.api.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agi-framework.secret.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-framework.labels" . | nindent 4 }}
type: Opaque
stringData:
  # 应用密钥
  APP_SECRET_KEY: {{ .Values.api.secrets.appSecretKey | default (randAlphaNum 32) | quote }}
  
  # 数据库凭证
  {{- if .Values.postgresql.enabled }}
  DB_USER: {{ .Values.postgresql.auth.username | quote }}
  DB_PASSWORD: {{ .Values.postgresql.auth.password | default (randAlphaNum 16) | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgresql:5432/%s" .Values.postgresql.auth.username (default (randAlphaNum 16) .Values.postgresql.auth.password) (include "agi-framework.fullname" .) .Values.postgresql.auth.database | quote }}
  {{- end }}
  
  # Redis密码
  {{- if .Values.redis.enabled }}
  REDIS_PASSWORD: {{ .Values.redis.auth.password | default (randAlphaNum 16) | quote }}
  {{- end }}
  
  # JWT配置
  JWT_SECRET_KEY: {{ .Values.api.secrets.jwtSecretKey | default (randAlphaNum 32) | quote }}
  JWT_ALGORITHM: "HS256"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
  
  # 外部API密钥（从values注入）
  {{- if .Values.api.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.api.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.api.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.api.secrets.anthropicApiKey | quote }}
  {{- end }}
  
  # AWS/S3配置
  {{- if .Values.minio.enabled }}
  S3_ACCESS_KEY: {{ .Values.minio.auth.rootUser | quote }}
  S3_SECRET_KEY: {{ .Values.minio.auth.rootPassword | default (randAlphaNum 16) | quote }}
  {{- end }}
  
  # 邮件服务配置
  {{- if .Values.api.secrets.smtp }}
  SMTP_HOST: {{ .Values.api.secrets.smtp.host | quote }}
  SMTP_PORT: {{ .Values.api.secrets.smtp.port | quote }}
  SMTP_USER: {{ .Values.api.secrets.smtp.user | quote }}
  SMTP_PASSWORD: {{ .Values.api.secrets.smtp.password | quote }}
  {{- end }}

---
{{/* =============================================================================
AGI Unified Framework - TLS Secret Template
============================================================================= */}}
{{- if and .Values.api.enabled .Values.api.ingress.enabled .Values.api.ingress.tls }}
{{- $tlsSecretName := (index .Values.api.ingress.tls 0).secretName }}
{{- if not (lookup "v1" "Secret" .Release.Namespace $tlsSecretName) }}
# 注意：生产环境应使用cert-manager自动管理证书
# 此Secret仅在证书不存在时创建占位符
apiVersion: v1
kind: Secret
metadata:
  name: {{ $tlsSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-framework.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/alt-names: ""
    cert-manager.io/certificate-name: {{ $tlsSecretName }}
    cert-manager.io/common-name: ""
    cert-manager.io/ip-sans: ""
    cert-manager.io/issuer-group: ""
    cert-manager.io/issuer-kind: ClusterIssuer
    cert-manager.io/issuer-name: letsencrypt-prod
    cert-manager.io/uri-sans: ""
type: kubernetes.io/tls
data:
  tls.crt: ""
  tls.key: ""
{{- end }}
{{- end }}

---
{{/* =============================================================================
AGI Unified Framework - Docker Registry Secret Template
============================================================================= */}}
{{- if .Values.global.imagePullSecrets }}
{{- range .Values.global.imagePullSecrets }}
{{- if eq .name "regcred" }}
{{- if not (lookup "v1" "Secret" $.Release.Namespace .name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "agi-framework.labels" $ | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ template "imagePullSecret" $ }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

{{/* =============================================================================
Helper for generating dockerconfigjson
============================================================================= */}}
{{- define "imagePullSecret" }}
{{- with .Values.global.imageCredentials }}
{{- printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"email\":\"%s\",\"auth\":\"%s\"}}}" .registry .username .password .email (printf "%s:%s" .username .password | b64enc) | b64enc }}
{{- end }}
{{- end }}
