{{/* =============================================================================
AGI Unified Framework - Network Policy Templates
============================================================================= */}}

{{/* Default Deny All Ingress/Egress */}}
{{- if .Values.networkPolicy.defaultDeny }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agi-framework.fullname" . }}-default-deny-all
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-framework.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
{{- end }}

---
{{/* API Network Policy */}}
{{- if and .Values.api.enabled .Values.api.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agi-framework.api.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-framework.api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "agi-framework.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress
  
  ingress:
    # Allow HTTP traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    
    # Allow metrics scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9090
    
    # Allow from specific namespaces
    {{- range .Values.api.networkPolicy.ingressRules }}
    - from:
        {{- if .namespaceSelector }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .namespaceSelector | nindent 14 }}
        {{- end }}
        {{- if .podSelector }}
        - podSelector:
            matchLabels:
              {{- toYaml .podSelector | nindent 14 }}
        {{- end }}
      {{- if .ports }}
      ports:
        {{- toYaml .ports | nindent 8 }}
      {{- end }}
    {{- end }}
    
    # Allow external access if configured
    {{- if .Values.api.networkPolicy.allowExternal }}
    - {}
    {{- end }}
    
    # Extra ingress rules
    {{- if .Values.api.networkPolicy.extraIngress }}
    {{- toYaml .Values.api.networkPolicy.extraIngress | nindent 4 }}
    {{- end }}
  
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    
    # Allow connection to PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432
    
    # Allow connection to Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 6379
    
    # Allow connection to MinIO
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 9000
    
    # Allow external egress if configured
    {{- if .Values.api.networkPolicy.allowExternalEgress }}
    - {}
    {{- end }}
    
    # Extra egress rules
    {{- if .Values.api.networkPolicy.extraEgress }}
    {{- toYaml .Values.api.networkPolicy.extraEgress | nindent 4 }}
    {{- end }}
{{- end }}

---
{{/* Worker Network Policy */}}
{{- if .Values.worker.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agi-framework.worker.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-framework.worker.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "agi-framework.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  policyTypes:
    - Egress
  
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    
    # Allow connection to PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432
    
    # Allow connection to Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 6379
    
    # Allow connection to MinIO
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 9000
    
    # Allow external egress for model downloads, API calls, etc.
    - {}
{{- end }}

---
{{/* Beat Network Policy */}}
{{- if .Values.beat.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agi-framework.beat.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-framework.beat.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "agi-framework.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: scheduler
  policyTypes:
    - Egress
  
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    
    # Allow connection to PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432
    
    # Allow connection to Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 6379
{{- end }}

---
{{/* Allow from monitoring namespace */}}
{{- if .Values.global.monitoring.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agi-framework.fullname" . }}-allow-monitoring
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-framework.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "agi-framework.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 8000
{{- end }}
