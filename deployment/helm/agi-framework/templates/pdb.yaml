{{/* =============================================================================
AGI Unified Framework - Pod Disruption Budget Templates
============================================================================= */}}

{{/* API PDB */}}
{{- if and .Values.api.enabled .Values.api.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "agi-framework.api.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-framework.api.labels" . | nindent 4 }}
    {{- with .Values.api.podDisruptionBudget.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- with .Values.api.podDisruptionBudget.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.api.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.api.podDisruptionBudget.minAvailable }}
  {{- end }}
  {{- if .Values.api.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ .Values.api.podDisruptionBudget.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "agi-framework.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
{{- end }}

---
{{/* Worker PDB */}}
{{- if and .Values.worker.enabled .Values.worker.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "agi-framework.worker.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-framework.worker.labels" . | nindent 4 }}
spec:
  {{- if .Values.worker.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.worker.podDisruptionBudget.minAvailable }}
  {{- end }}
  {{- if .Values.worker.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ .Values.worker.podDisruptionBudget.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "agi-framework.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
{{- end }}

---
{{/* Beat PDB */}}
{{- if and .Values.beat.enabled .Values.beat.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "agi-framework.beat.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-framework.beat.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "agi-framework.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: scheduler
{{- end }}

---
{{/* PostgreSQL PDB (if using in-cluster database) */}}
{{- if and .Values.postgresql.enabled .Values.postgresql.primary.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "agi-framework.fullname" . }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-framework.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  minAvailable: {{ .Values.postgresql.primary.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

---
{{/* Redis PDB (if using in-cluster cache) */}}
{{- if and .Values.redis.enabled .Values.redis.master.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "agi-framework.fullname" . }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-framework.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache
spec:
  minAvailable: {{ .Values.redis.master.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
