<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能市场 - AGI 统一框架</title>
    <meta name="description" content="技能市场，浏览、安装和管理AI技能，创建自定义技能">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        /* Skill Market Specific Styles */
        .skill-market-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - var(--header-height, 56px));
            overflow: hidden;
        }
        
        /* Header Section */
        .market-header {
            background: linear-gradient(135deg, var(--primary-600) 0%, var(--secondary-600) 100%);
            color: white;
            padding: 32px 40px;
        }
        
        .market-header-content {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .market-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .market-subtitle {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 24px;
        }
        
        .market-search-bar {
            display: flex;
            gap: 12px;
            max-width: 700px;
        }
        
        .market-search-input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: var(--radius-xl);
            font-size: 16px;
            background: rgba(255, 255, 255, 0.95);
            color: var(--text-primary);
        }
        
        .market-search-input:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.3);
        }
        
        .market-search-btn {
            padding: 14px 28px;
            background: var(--gray-900);
            color: white;
            border: none;
            border-radius: var(--radius-xl);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .market-search-btn:hover {
            background: var(--gray-800);
            transform: translateY(-1px);
        }
        
        /* Main Content */
        .market-content {
            flex: 1;
            display: flex;
            overflow: hidden;
            background: var(--bg-secondary);
        }
        
        /* Sidebar Filters */
        .market-sidebar {
            width: 280px;
            background: var(--bg-primary);
            border-right: 1px solid var(--border-default);
            padding: 24px;
            overflow-y: auto;
        }
        
        .filter-section {
            margin-bottom: 28px;
        }
        
        .filter-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .filter-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .filter-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .filter-item:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .filter-item.active {
            background: var(--primary-50);
            color: var(--primary-600);
            font-weight: 500;
        }
        
        .filter-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-500);
        }
        
        .filter-count {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-caption);
            background: var(--bg-secondary);
            padding: 2px 8px;
            border-radius: var(--radius-full);
        }
        
        /* Rating Filter */
        .rating-filter {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .rating-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: var(--radius-lg);
            transition: all 0.2s;
        }
        
        .rating-option:hover {
            background: var(--bg-secondary);
        }
        
        .stars {
            color: var(--warning-400);
            font-size: 14px;
        }
        
        .rating-label {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        /* Main Area */
        .market-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Toolbar */
        .market-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-default);
        }
        
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .results-count {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .active-filters {
            display: flex;
            gap: 8px;
        }
        
        .filter-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--primary-50);
            color: var(--primary-600);
            border-radius: var(--radius-full);
            font-size: 13px;
        }
        
        .filter-tag button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--primary-600);
        }
        
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .sort-select {
            padding: 8px 12px;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            background: var(--bg-primary);
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .view-toggle {
            display: flex;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 4px;
        }
        
        .view-btn {
            padding: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .view-btn.active {
            background: var(--bg-primary);
            color: var(--primary-500);
            box-shadow: var(--shadow-sm);
        }
        
        .create-skill-btn {
            padding: 10px 20px;
            background: var(--primary-500);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .create-skill-btn:hover {
            background: var(--primary-600);
        }
        
        /* Skills Grid */
        .skills-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .skill-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-2xl);
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .skill-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary-300);
        }
        
        .skill-card.installed {
            border-color: var(--success-300);
        }
        
        .skill-header {
            padding: 20px;
            display: flex;
            gap: 16px;
        }
        
        .skill-icon {
            width: 64px;
            height: 64px;
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: linear-gradient(135deg, var(--primary-100) 0%, var(--primary-200) 100%);
            flex-shrink: 0;
        }
        
        .skill-info {
            flex: 1;
            min-width: 0;
        }
        
        .skill-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .skill-author {
            font-size: 13px;
            color: var(--text-caption);
            margin-bottom: 8px;
        }
        
        .skill-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .skill-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--warning-500);
        }
        
        .skill-downloads {
            font-size: 13px;
            color: var(--text-caption);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .skill-version {
            font-size: 12px;
            padding: 2px 8px;
            background: var(--bg-secondary);
            border-radius: var(--radius-full);
            color: var(--text-secondary);
        }
        
        .skill-description {
            padding: 0 20px 16px;
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .skill-tags {
            padding: 0 20px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .skill-tag {
            padding: 4px 10px;
            background: var(--bg-secondary);
            border-radius: var(--radius-full);
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .skill-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-top: 1px solid var(--border-default);
            background: var(--bg-secondary);
        }
        
        .skill-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .skill-price.free {
            color: var(--success-500);
        }
        
        .skill-actions {
            display: flex;
            gap: 8px;
        }
        
        .skill-btn {
            padding: 8px 16px;
            border-radius: var(--radius-lg);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        
        .skill-btn.primary {
            background: var(--primary-500);
            color: white;
        }
        
        .skill-btn.primary:hover {
            background: var(--primary-600);
        }
        
        .skill-btn.secondary {
            background: var(--bg-primary);
            color: var(--text-secondary);
            border: 1px solid var(--border-default);
        }
        
        .skill-btn.secondary:hover {
            background: var(--bg-hover);
        }
        
        .skill-btn.success {
            background: var(--success-500);
            color: white;
        }
        
        /* Skill Detail Modal */
        .skill-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 40px;
        }
        
        .skill-modal-overlay.active {
            display: flex;
        }
        
        .skill-modal {
            background: var(--bg-primary);
            border-radius: var(--radius-2xl);
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .skill-modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-default);
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }
        
        .skill-modal-icon {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            background: linear-gradient(135deg, var(--primary-100) 0%, var(--primary-200) 100%);
            flex-shrink: 0;
        }
        
        .skill-modal-info {
            flex: 1;
        }
        
        .skill-modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .skill-modal-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .skill-modal-close {
            background: none;
            border: none;
            font-size: 28px;
            color: var(--text-caption);
            cursor: pointer;
            padding: 4px;
        }
        
        .skill-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        
        .skill-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-default);
        }
        
        .skill-tab {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .skill-tab:hover {
            color: var(--text-primary);
        }
        
        .skill-tab.active {
            color: var(--primary-500);
            border-bottom-color: var(--primary-500);
        }
        
        .skill-tab-panel {
            display: none;
        }
        
        .skill-tab-panel.active {
            display: block;
        }
        
        .skill-readme {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-secondary);
        }
        
        .skill-readme h1,
        .skill-readme h2,
        .skill-readme h3 {
            color: var(--text-primary);
            margin: 24px 0 16px;
        }
        
        .skill-readme code {
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: var(--font-family-mono);
            font-size: 13px;
        }
        
        .skill-readme pre {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: var(--radius-lg);
            overflow-x: auto;
        }
        
        .skill-readme pre code {
            background: none;
            padding: 0;
        }
        
        /* Reviews */
        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .review-item {
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
        }
        
        .review-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .reviewer {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .reviewer-avatar {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            background: var(--primary-200);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--primary-700);
        }
        
        .reviewer-name {
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .review-date {
            font-size: 13px;
            color: var(--text-caption);
        }
        
        .review-rating {
            color: var(--warning-400);
        }
        
        .review-content {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
        }
        
        /* Versions */
        .versions-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .version-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
        }
        
        .version-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .version-number {
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .version-badge {
            padding: 2px 8px;
            background: var(--success-100);
            color: var(--success-600);
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
        }
        
        .version-date {
            font-size: 13px;
            color: var(--text-caption);
        }
        
        .version-changelog {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .skill-modal-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-top: 1px solid var(--border-default);
            background: var(--bg-secondary);
        }
        
        /* Skill Editor */
        .editor-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 1000;
            display: none;
            flex-direction: column;
        }
        
        .editor-overlay.active {
            display: flex;
        }
        
        .editor-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-default);
        }
        
        .editor-title {
            font-size: 20px;
            font-weight: 600;
        }
        
        .editor-actions {
            display: flex;
            gap: 12px;
        }
        
        .editor-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        .editor-sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-default);
            padding: 24px;
            overflow-y: auto;
        }
        
        .editor-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .editor-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-default);
            background: var(--bg-secondary);
        }
        
        .editor-toolbar-btn {
            padding: 8px 12px;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .editor-toolbar-btn:hover {
            background: var(--bg-hover);
        }
        
        .editor-code {
            flex: 1;
            padding: 20px 24px;
            font-family: var(--font-family-mono);
            font-size: 14px;
            line-height: 1.6;
            background: var(--bg-primary);
            border: none;
            resize: none;
            outline: none;
            color: var(--text-primary);
        }
        
        /* Installed Skills Panel */
        .installed-panel {
            position: fixed;
            right: -400px;
            top: var(--header-height);
            bottom: 0;
            width: 400px;
            background: var(--bg-primary);
            border-left: 1px solid var(--border-default);
            box-shadow: var(--shadow-xl);
            z-index: 100;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        .installed-panel.open {
            right: 0;
        }
        
        .installed-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-default);
        }
        
        .installed-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .installed-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        
        .installed-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .installed-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            margin-bottom: 12px;
        }
        
        .installed-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: var(--bg-primary);
        }
        
        .installed-info {
            flex: 1;
        }
        
        .installed-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        
        .installed-version {
            font-size: 12px;
            color: var(--text-caption);
        }
        
        .installed-actions {
            display: flex;
            gap: 8px;
        }
        
        .installed-btn {
            padding: 6px 12px;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            font-size: 12px;
            cursor: pointer;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: var(--radius-lg);
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10000;
            animation: slideIn 0.3s ease;
        }
        
        .toast.success { background: var(--success-500); }
        .toast.error { background: var(--danger-500); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .market-sidebar {
                position: fixed;
                left: -280px;
                top: calc(var(--header-height) + 180px);
                bottom: 0;
                z-index: 100;
                transition: left 0.3s ease;
            }
            
            .market-sidebar.open {
                left: 0;
            }
            
            .skills-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }
        
        @media (max-width: 768px) {
            .market-header {
                padding: 20px;
            }
            
            .market-title {
                font-size: 24px;
            }
            
            .market-search-bar {
                flex-direction: column;
            }
            
            .skills-grid {
                grid-template-columns: 1fr;
            }
            
            .skill-modal-overlay {
                padding: 0;
            }
            
            .skill-modal {
                max-height: 100vh;
                border-radius: 0;
            }
            
            .installed-panel {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>
<body>

            // Load installed skills
            loadInstalledSkills() {
                this.installedSkills = this.skills.filter(s => s.installed);
                this.renderInstalledSkills();
                document.getElementById('installedCount').textContent = this.installedSkills.length;
            }
            
            // Apply filters
            applyFilters() {
                let filtered = this.skills;
                
                // Category filter
                if (this.currentCategory !== 'all') {
                    filtered = filtered.filter(s => s.category === this.currentCategory);
                }
                
                // Rating filter
                if (this.currentRating !== 'all') {
                    filtered = filtered.filter(s => s.rating >= parseInt(this.currentRating));
                }
                
                // Free only
                if (document.getElementById('freeOnly')?.checked) {
                    filtered = filtered.filter(s => s.price === 0);
                }
                
                // Installed only
                if (document.getElementById('installedOnly')?.checked) {
                    filtered = filtered.filter(s => s.installed);
                }
                
                // Verified only
                if (document.getElementById('verifiedOnly')?.checked) {
                    filtered = filtered.filter(s => s.verified);
                }
                
                // Search
                const searchTerm = document.getElementById('skillSearch')?.value.toLowerCase() || '';
                if (searchTerm) {
                    filtered = filtered.filter(s => 
                        s.name.toLowerCase().includes(searchTerm) ||
                        s.description.toLowerCase().includes(searchTerm) ||
                        s.tags.some(t => t.toLowerCase().includes(searchTerm))
                    );
                }
                
                // Sort
                const sortBy = document.getElementById('sortSelect')?.value || 'popular';
                switch (sortBy) {
                    case 'newest':
                        filtered.sort((a, b) => b.version.localeCompare(a.version));
                        break;
                    case 'rating':
                        filtered.sort((a, b) => b.rating - a.rating);
                        break;
                    case 'name':
                        filtered.sort((a, b) => a.name.localeCompare(b.name));
                        break;
                    default:
                        filtered.sort((a, b) => b.downloads - a.downloads);
                }
                
                this.filteredSkills = filtered;
                this.renderSkills();
            }
            
            // Render skills
            renderSkills() {

                document.getElementById('resultsCount').textContent = this.filteredSkills.length;

                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = this.filteredSkills.map(skill => `

                                    </span>
                                    <span class="skill-downloads">

                                        <span>${this.formatNumber(skill.downloads)}</span>
                                    </span>
                                    <span class="skill-version">v${skill.version}</span>
                                </div>
                            </div>
                        </div>
                        <div class="skill-description">${skill.description}</div>
                        <div class="skill-tags">
                            ${skill.tags.map(tag => `<span class="skill-tag">${tag}</span>`).join('')}
                        </div>
                        <div class="skill-footer">

                                `}

                if (!skill) return;
                
                this.currentSkill = skill;
                
                document.getElementById('modalIcon').textContent = skill.icon;
                document.getElementById('modalTitle').textContent = skill.name;
                document.getElementById('modalAuthor').textContent = skill.author;
                document.getElementById('modalRating').textContent = '★'.repeat(Math.floor(skill.rating)) + '☆'.repeat(5 - Math.floor(skill.rating));
                document.getElementById('modalDownloads').textContent = this.formatNumber(skill.downloads) + ' 下载';
                document.getElementById('modalVersion').textContent = 'v' + skill.version;
                document.getElementById('modalPrice').textContent = skill.price === 0 ? '免费' : '¥' + skill.price;
                document.getElementById('modalPrice').className = 'skill-price ' + (skill.price === 0 ? 'free' : '');
                
                document.getElementById('modalReadme').innerHTML = `
                    <h2>功能介绍</h2>
                    <p>${skill.description}</p>
                    <h2>使用说明</h2>
                    <p>安装后，您可以通过以下方式使用此技能：</p>
                    <ol>
                        <li>在对话中直接提及技能名称</li>
                        <li>使用快捷命令 /${skill.name.toLowerCase().replace(/\s+/g, '-')}</li>
                        <li>在工具栏中点击技能图标</li>
                    </ol>
                    <h2>标签</h2>
                    <p>${skill.tags.map(t => `<code>${t}</code>`).join(' ')}</p>
                `;
                
                // Load reviews
                document.getElementById('reviewsList').innerHTML = [
                    { name: '张三', rating: 5, date: '2024-01-15', content: '非常好用的技能，大大提高了工作效率！' },
                    { name: '李四', rating: 4, date: '2024-01-10', content: '功能强大，但希望能增加更多自定义选项。' },
                    { name: '王五', rating: 5, date: '2024-01-05', content: '完美解决了我遇到的问题，强烈推荐！' }
                ].map(review => `
                    <div class="review-item">
                        <div class="review-header">
                            <div class="reviewer">
                                <div class="reviewer-avatar">${review.name[0]}</div>
                                <div>
                                    <div class="reviewer-name">${review.name}</div>
                                    <div class="review-date">${review.date}</div>
                                </div>
                            </div>
                            <div class="review-rating">${'★'.repeat(review.rating)}</div>
                        </div>
                        <div class="review-content">${review.content}</div>
                    </div>
                `).join('');
                
                // Load versions
                document.getElementById('versionsList').innerHTML = [
                    { version: skill.version, date: '2024-01-15', current: true, changelog: '修复已知问题，提升性能' },
                    { version: '1.9.0', date: '2024-01-01', current: false, changelog: '新增批量处理功能' },
                    { version: '1.8.0', date: '2023-12-15', current: false, changelog: '优化用户界面' }
                ].map(v => `
                    <div class="version-item">
                        <div class="version-info">
                            <div>
                                <span class="version-number">v${v.version}</span>
                                ${v.current ? '<span class="version-badge">当前</span>' : ''}
                            </div>
                            <div class="version-date">${v.date}</div>
                            <div class="version-changelog">${v.changelog}</div>
                        </div>
                        ${!v.current ? `<button class="skill-btn secondary">降级</button>` : ''}
                    </div>
                `).join('');
                
                // Update install button
                const installBtn = document.getElementById('modalInstall');
                if (skill.installed) {
                    installBtn.textContent = '已安装';
                    installBtn.className = 'skill-btn success';
                    installBtn.disabled = true;
                } else {
                    installBtn.textContent = skill.price === 0 ? '安装' : '购买并安装';
                    installBtn.className = 'skill-btn primary';
                    installBtn.disabled = false;
                    installBtn.onclick = () => {
                        this.installSkill(skill.id);
                        document.getElementById('skillModal').classList.remove('active');
                    };
                }
                
                document.getElementById('skillModal').classList.add('active');
            }
            
            // Install skill
            installSkill(skillId) {
                const skill = this.skills.find(s => s.id === skillId);
                if (!skill) return;
                
                skill.installed = true;
                skill.downloads++;
                this.loadInstalledSkills();
                this.applyFilters();
                
                this.showToast(`"${skill.name}" 安装成功`, 'success');
            }
            
            // Uninstall skill
            uninstallSkill(skillId) {
                const skill = this.skills.find(s => s.id === skillId);
                if (!skill) return;
                
                if (!confirm(`确定要卸载 "${skill.name}" 吗？`)) return;
                
                skill.installed = false;
                this.loadInstalledSkills();
                this.applyFilters();
                
                this.showToast(`"${skill.name}" 已卸载`, 'success');
            }
            
            // Bind events
            bindEvents() {
                // Category filters
                document.getElementById('categoryFilters').addEventListener('click', (e) => {
                    const item = e.target.closest('.filter-item');
                    if (item) {
                        document.querySelectorAll('#categoryFilters .filter-item').forEach(i => i.classList.remove('active'));
                        item.classList.add('active');
                        this.currentCategory = item.dataset.category;
                        this.applyFilters();
                    }
                });
                
                // Rating filters
                document.querySelectorAll('.rating-option').forEach(option => {
                    option.addEventListener('click', () => {
                        this.currentRating = option.dataset.rating;
                        this.applyFilters();
                    });
                });
                
                // Checkboxes
                document.getElementById('freeOnly')?.addEventListener('change', () => this.applyFilters());
                document.getElementById('installedOnly')?.addEventListener('change', () => this.applyFilters());
                document.getElementById('verifiedOnly')?.addEventListener('change', () => this.applyFilters());
                
                // Search
                document.getElementById('skillSearch').addEventListener('input', () => {
                    this.applyFilters();
                });
                
                document.getElementById('searchBtn').addEventListener('click', () => {
                    this.applyFilters();
                });
                
                // Sort
                document.getElementById('sortSelect').addEventListener('change', () => {
                    this.applyFilters();
                });
                
                // View toggle
                document.getElementById('gridViewBtn').addEventListener('click', () => {
                    this.viewMode = 'grid';
                    document.getElementById('gridViewBtn').classList.add('active');
                    document.getElementById('listViewBtn').classList.remove('active');
                });
                
                document.getElementById('listViewBtn').addEventListener('click', () => {
                    this.viewMode = 'list';
                    document.getElementById('listViewBtn').classList.add('active');
                    document.getElementById('gridViewBtn').classList.remove('active');
                });
                
                // Create skill
                document.getElementById('createSkillBtn').addEventListener('click', () => {
                    document.getElementById('skillEditor').classList.add('active');
                });
                
                document.getElementById('editorCancel').addEventListener('click', () => {
                    document.getElementById('skillEditor').classList.remove('active');
                });
                
                document.getElementById('editorPublish').addEventListener('click', () => {
                    this.showToast('技能发布成功！', 'success');
                    document.getElementById('skillEditor').classList.remove('active');
                });
                
                // Installed panel
                document.getElementById('installedSkillsBtn').addEventListener('click', () => {
                    document.getElementById('installedPanel').classList.add('open');
                });
                
                document.getElementById('closeInstalled').addEventListener('click', () => {
                    document.getElementById('installedPanel').classList.remove('open');
                });
                
                // Modal
                document.getElementById('closeModal').addEventListener('click', () => {
                    document.getElementById('skillModal').classList.remove('active');
                });
                
                document.getElementById('skillModal').addEventListener('click', (e) => {
                    if (e.target === document.getElementById('skillModal')) {
                        document.getElementById('skillModal').classList.remove('active');
                    }
                });
                
                // Skill tabs
                document.querySelectorAll('.skill-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        const tabName = tab.dataset.tab;
                        document.querySelectorAll('.skill-tab').forEach(t => t.classList.remove('active'));
                        document.querySelectorAll('.skill-tab-panel').forEach(p => p.classList.remove('active'));
                        tab.classList.add('active');
                        document.getElementById(tabName + 'Panel').classList.add('active');
                    });
                });
                
                // Theme toggle
                document.getElementById('themeToggle').addEventListener('click', () => {
                    this.toggleTheme();
                });
            }
            
            formatNumber(num) {
                if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
                if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
                return num.toString();
            }
            
            showToast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `
                    <span>${type === 'success' ? '✓' : '✗'}</span>
                    <span>${message}</span>
                `;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.animation = 'slideIn 0.3s ease reverse';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }
            
            loadTheme() {
                const theme = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', theme);
                document.getElementById('themeIcon').textContent = theme === 'dark' ? '☀️' : '🌙';
            }
            
            toggleTheme() {
                const current = document.documentElement.getAttribute('data-theme') || 'light';
                const next = current === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                document.getElementById('themeIcon').textContent = next === 'dark' ? '☀️' : '🌙';
            }
        }
        
        // Initialize
        let skillMarket;
        document.addEventListener('DOMContentLoaded', () => {
            skillMarket = new SkillMarket();
        });
    </script>
<script>
        
            // 侧边栏切换
            var sidebarToggle = document.getElementById('sidebarToggle');
            var sidebar = document.getElementById('sidebar');
            if (sidebarToggle && sidebar) {
                sidebarToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('collapsed');
                });
            }

        </script>
</body>
</html>
