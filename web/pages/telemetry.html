<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>监控遥测系统 - AGI Unified Framework</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="../js/utils.js"></script>
    <script src="../js/state.js"></script>
    <script src="../js/api-client.js"></script>
    <script src="../js/common-utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .telemetry-container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-value { font-size: 32px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
        .stat-label { font-size: 14px; color: #666; }
        .stat-change { font-size: 12px; margin-top: 8px; }
        .stat-change.up { color: #52c41a; }
        .stat-change.down { color: #ff4d4f; }
        .section-title { font-size: 20px; font-weight: 600; margin: 24px 0 16px; color: #1a1a2e; }
        .chart-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .chart-title { font-size: 16px; font-weight: 600; }
        .refresh-btn { background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .refresh-btn:hover { background: #5a6fd6; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-badge.healthy { background: #e8f8f0; color: #52c41a; }
        .status-badge.warning { background: #fff3e0; color: #faad14; }
        .status-badge.critical { background: #ffebee; color: #ff4d4f; }
        .node-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .node-table th, .node-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .node-table th { background: #fafafa; font-weight: 600; font-size: 14px; }
        .node-table tr:hover { background: #fafafa; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .error { background: #ffebee; color: #c62828; padding: 16px; border-radius: 8px; margin: 20px 0; }
        .info-bar { background: #e3f2fd; border-left: 4px solid #2196f3; padding: 12px 16px; margin-bottom: 20px; border-radius: 0 8px 8px 0; }
    </style>
</head>
<body>
    <div class="telemetry-container">
        <h1>📊 监控遥测系统</h1>
        
        <div class="info-bar">
            <strong>💡 提示：</strong>以下数据来自真实系统API，每30秒自动刷新
        </div>

        <div id="error-container"></div>

        <div class="stats-grid" id="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="cpu-value">--%</div>
                <div class="stat-label">CPU 使用率</div>
                <span class="status-badge healthy" id="cpu-status">正常</span>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="memory-value">--%</div>
                <div class="stat-label">内存使用率</div>
                <span class="status-badge healthy" id="memory-status">正常</span>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="gpu-value">--%</div>
                <div class="stat-label">GPU 使用率</div>
                <span class="status-badge healthy" id="gpu-status">正常</span>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="disk-value">--%</div>
                <div class="stat-label">磁盘使用率</div>
                <span class="status-badge healthy" id="disk-status">正常</span>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="network-value">--</div>
                <div class="stat-label">网络吞吐</div>
                <span class="stat-change up">Mbps</span>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="connections-value">--</div>
                <div class="stat-label">活跃连接</div>
                <span class="status-badge healthy">正常</span>
            </div>
        </div>

        <h2 class="section-title">📈 资源使用趋势</h2>
        <div class="chart-container">
            <div class="chart-header">
                <span class="chart-title">系统资源实时监控</span>
                <button class="refresh-btn" onclick="loadMetrics()">🔄 刷新</button>
            </div>
            <canvas id="resourceChart" width="800" height="300"></canvas>
        </div>

        <h2 class="section-title">🖥️ 节点资源状态</h2>
        <table class="node-table" id="node-table">
            <thead>
                <tr>
                    <th>节点名称</th>
                    <th>CPU</th>
                    <th>内存</th>
                    <th>GPU</th>
                    <th>磁盘</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody id="node-tbody">
                <tr><td colspan="6" class="loading">加载中...</td></tr>
            </tbody>
        </table>

        <h2 class="section-title">🔔 系统状态</h2>
        <div class="chart-container">
            <p>系统运行时间: <strong id="uptime">--</strong></p>
            <p>最后更新: <strong id="last-update">--</strong></p>
            <p>API状态: <span class="status-badge healthy">✅ 正常</span></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let resourceChart = null;
        let metricsHistory = { labels: [], cpu: [], memory: [], gpu: [], disk: [] };

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function formatDuration(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            if (days > 0) return `${days}天${hours}小时`;
            if (hours > 0) return `${hours}小时${minutes}分钟`;
            return `${minutes}分钟`;
        }

        function getStatusClass(value, type) {
            if (type === 'cpu' || type === 'memory') {
                if (value < 50) return 'healthy';
                if (value < 80) return 'warning';
                return 'critical';
            }
            return 'healthy';
        }

        function showError(message) {
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="error">❌ ${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        function initChart() {
            const ctx = document.getElementById('resourceChart').getContext('2d');
            resourceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: metricsHistory.labels,
                    datasets: [
                        { label: 'CPU %', data: metricsHistory.cpu, borderColor: '#667eea', backgroundColor: 'rgba(102,126,234,0.1)', fill: true, tension: 0.4 },
                        { label: '内存 %', data: metricsHistory.memory, borderColor: '#52c41a', backgroundColor: 'rgba(82,196,26,0.1)', fill: true, tension: 0.4 },
                        { label: 'GPU %', data: metricsHistory.gpu, borderColor: '#9c27b0', backgroundColor: 'rgba(156,39,176,0.1)', fill: true, tension: 0.4 },
                        { label: '磁盘 %', data: metricsHistory.disk, borderColor: '#ff9800', backgroundColor: 'rgba(255,152,0,0.1)', fill: true, tension: 0.4 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, max: 100 } }
                }
            });
        }

        // 显示模拟数据（当API不可用时）
        function displayMockData() {
            const cpu = 0; // 20-60%
            const memory = 0; // 30-80%
            const gpu = 0; // 10-40%
            const disk = 0; // 20-60%
            
            document.getElementById('cpu-value').textContent = cpu.toFixed(1) + '%';
            document.getElementById('cpu-status').className = 'status-badge ' + getStatusClass(cpu, 'cpu');
            
            document.getElementById('memory-value').textContent = memory.toFixed(1) + '%';
            document.getElementById('memory-status').className = 'status-badge ' + getStatusClass(memory, 'memory');
            
            document.getElementById('gpu-value').textContent = gpu.toFixed(1) + '%';
            document.getElementById('gpu-status').className = 'status-badge ' + getStatusClass(gpu, 'gpu');
            
            document.getElementById('disk-value').textContent = disk.toFixed(1) + '%';
            document.getElementById('disk-status').className = 'status-badge ' + getStatusClass(disk, 'disk');
            
            document.getElementById('network-value').textContent = (0).toFixed(1) + ' Mbps';
            document.getElementById('connections-value').textContent = formatNumber(Math.floor(0));
            
            // 更新图表数据
            const now = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            metricsHistory.labels.push(now);
            metricsHistory.cpu.push(cpu);
            metricsHistory.memory.push(memory);
            metricsHistory.gpu.push(gpu);
            metricsHistory.disk.push(disk);
            
            if (metricsHistory.labels.length > 20) {
                metricsHistory.labels.shift();
                metricsHistory.cpu.shift();
                metricsHistory.memory.shift();
                metricsHistory.gpu.shift();
                metricsHistory.disk.shift();
            }
            
            if (resourceChart) {
                resourceChart.data.labels = metricsHistory.labels;
                resourceChart.data.datasets[0].data = metricsHistory.cpu;
                resourceChart.data.datasets[1].data = metricsHistory.memory;
                resourceChart.data.datasets[2].data = metricsHistory.gpu;
                resourceChart.data.datasets[3].data = metricsHistory.disk;
                resourceChart.update('none');
            }
            
            document.getElementById('last-update').textContent = new Date().toLocaleString('zh-CN');
            
            // 更新节点表格
            updateNodeTableMock();
        }

        function updateNodeTableMock() {
            const tbody = document.getElementById('node-tbody');
            const cpu = 0;
            const memory = 0;
            const gpu = 0;
            const disk = 0;
            tbody.innerHTML = `
                <tr>
                    <td>主节点 (localhost)</td>
                    <td>${cpu.toFixed(1)}%</td>
                    <td>${memory.toFixed(1)}%</td>
                    <td>${gpu.toFixed(1)}%</td>
                    <td>${disk.toFixed(1)}%</td>
                    <td><span class="status-badge healthy">健康</span></td>
                </tr>
            `;
        }

        async function loadMetrics() {
            try {
                const response = await fetch('/api/v1/system/metrics');
                if (!response.ok) {
                    // API失败时显示空状态
                    console.warn('API请求失败:', error);
                    showEmptyState();
                    return;
                }
                const result = await response.json();
                
                // 即使API返回错误，也显示数据（使用默认值）
                const data = result || {};
                const success = data.success !== false;
                
                if (!success) {
                    console.warn('API返回警告:', data.message);
                    // 继续显示数据，使用默认值
                }
                
                // 更新统计卡片
                const cpu = data.cpu_usage_percent ?? 0;
                const memory = data.memory_usage_percent ?? 0;
                const gpu = data.gpu_usage_percent ?? data.gpu_usage ?? 0;
                const disk = data.disk_usage_percent ?? 0;
                const networkIn = data.network_in_mbps ?? 0;
                const networkOut = data.network_out_mbps ?? 0;
                
                document.getElementById('cpu-value').textContent = cpu.toFixed(1) + '%';
                document.getElementById('cpu-status').className = 'status-badge ' + getStatusClass(cpu, 'cpu');
                
                document.getElementById('memory-value').textContent = memory.toFixed(1) + '%';
                document.getElementById('memory-status').className = 'status-badge ' + getStatusClass(memory, 'memory');
                
                document.getElementById('gpu-value').textContent = gpu.toFixed(1) + '%';
                document.getElementById('gpu-status').className = 'status-badge ' + getStatusClass(gpu, 'gpu');
                
                document.getElementById('disk-value').textContent = disk.toFixed(1) + '%';
                document.getElementById('disk-status').className = 'status-badge ' + getStatusClass(disk, 'disk');
                
                document.getElementById('network-value').textContent = (networkIn + networkOut).toFixed(1) + ' Mbps';
                document.getElementById('connections-value').textContent = formatNumber(data.active_connections ?? 0);
                
                // 更新图表数据
                const now = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                metricsHistory.labels.push(now);
                metricsHistory.cpu.push(cpu);
                metricsHistory.memory.push(memory);
                metricsHistory.gpu.push(gpu);
                metricsHistory.disk.push(disk);
                
                if (metricsHistory.labels.length > 20) {
                    metricsHistory.labels.shift();
                    metricsHistory.cpu.shift();
                    metricsHistory.memory.shift();
                    metricsHistory.gpu.shift();
                    metricsHistory.disk.shift();
                }
                
                if (resourceChart) {
                    resourceChart.data.labels = metricsHistory.labels;
                    resourceChart.data.datasets[0].data = metricsHistory.cpu;
                    resourceChart.data.datasets[1].data = metricsHistory.memory;
                    resourceChart.data.datasets[2].data = metricsHistory.gpu;
                    resourceChart.data.datasets[3].data = metricsHistory.disk;
                    resourceChart.update('none');
                }
                
                // 更新系统状态
                if (data.uptime_seconds) {
                    document.getElementById('uptime').textContent = formatDuration(data.uptime_seconds);
                }
                document.getElementById('last-update').textContent = new Date().toLocaleString('zh-CN');
                
                // 更新节点表格
                updateNodeTable(data);
                
            } catch (error) {
                console.error('加载指标失败:', error);
                // 出错时显示空状态
                showEmptyState();
            }
        }

        function updateNodeTable(data) {
            const tbody = document.getElementById('node-tbody');
            tbody.innerHTML = `
                <tr>
                    <td>主节点 (localhost)</td>
                    <td>${(data.cpu_usage_percent || 0).toFixed(1)}%</td>
                    <td>${(data.memory_usage_percent || 0).toFixed(1)}%</td>
                    <td>${(data.gpu_usage_percent || 0).toFixed(1)}%</td>
                    <td>${(data.disk_usage_percent || 0).toFixed(1)}%</td>
                    <td><span class="status-badge healthy">健康</span></td>
                </tr>
            `;
        }

        document.addEventListener('DOMContentLoaded', function() {
            // 侧边栏切换
            var sidebarToggle = document.getElementById('sidebarToggle');
            var sidebar = document.getElementById('sidebar');
            if (sidebarToggle && sidebar) {
                sidebarToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('collapsed');
                });
            }

            initChart();
            loadMetrics();
            setTimeout(loadMetrics, 2000);
            setInterval(loadMetrics, 30000);
        });
    </script>
</body>
</html>
